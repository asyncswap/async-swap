[profile.default]
src = "src"
out = "out"
libs = ["lib", "dependencies"]
solc_version = "0.8.34"
optimizer = true
optimizer_runs = 200
via_ir = true
fs_permissions = [
  { access = "read", path = "./broadcast" },
  { access = "read-write", path = "./cache" }
]
ignored_error_codes = [2424, 8429]

[dependencies]
forge-std = "1.15.0"
v4-core = { version = "4", git = "https://github.com/Uniswap/v4-core.git", rev = "d153b048868a60c2403a3ef5b2301bb247884d46" }

[lint]
lint_on_build = false

# See more config options https://github.com/foundry-rs/foundry/blob/master/crates/config/README.md#all-options
